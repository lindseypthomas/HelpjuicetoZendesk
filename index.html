<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Helpjuice → Zendesk (Green theme) HTML Converter</title>
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --border: #d6dde3;
    --accent: #2b6cb0;
    --text: #2d3748;
    --muted: #718096;
    --danger-bg: #ffe5e5;
    --danger-border: #e53e3e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 14px 20px;
    background: #1a365d;
    color: #fff;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header p  { margin: 4px 0 0; font-size: 13px; opacity: 0.85; }
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    height: calc(100vh - 70px);
  }
  .pane {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .pane header {
    background: #edf2f7;
    color: var(--text);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 6px 6px 0 0;
  }
  .pane header h2 { margin: 0; font-size: 14px; font-weight: 600; }
  .pane header .actions button {
    font-size: 12px;
    padding: 4px 10px;
    margin-left: 6px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .pane header .actions button:hover { background: #234e7c; }
  .pane header .actions button.secondary {
    background: #edf2f7;
    color: var(--text);
    border: 1px solid var(--border);
  }
  textarea, .output {
    flex: 1;
    width: 100%;
    padding: 10px;
    border: none;
    resize: none;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.5;
    outline: none;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output {
    background: #fafbfc;
    color: #1a202c;
  }
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: #fff;
  }
  .tabs button {
    background: none;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 2px solid transparent;
    color: var(--muted);
  }
  .tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }
  .tab-content { display: none; flex: 1; min-height: 0; overflow: auto; }
  .tab-content.active { display: flex; flex-direction: column; }

    padding: 16px;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #384c60;
    line-height: 1.5;
    overflow: auto;
  }

    background: #e7f3fe;
    border-left: 4px solid #2b6cb0;
    padding: 10px 12px;
    margin: 10px 0;
  }
